version: '3'
services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:vinay2004@localhost:5432/todo_auth_app
    ports:
      - "8001:8001"
    depends_on:
      - db
  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8001
    ports:
      - "5173:5173"
  db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vinay2004
      POSTGRES_DB: todo_auth_app
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data: